<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <!-- apply saved theme before paint to avoid flash -->
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
  <!-- favicon -->
  <link rel="icon" type="image/png" href="{{ '/assets/img/favicon-light.png' | relative_url }}" id="favicon-el">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <header class="sheet page-corners">
    <span class="frame-tick tl" aria-hidden="true"></span>
    <span class="frame-tick tr" aria-hidden="true"></span>
    <nav class="nav">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-mark">
          <img src="{{ '/assets/img/favicon-clear.png' | relative_url }}" alt="ZJ" width="22" height="22" id="brand-mark-img">
        </span>
        {{ site.data.site.brand }}
      </a>
      <div class="nav-links">
        {% for item in site.data.site.nav %}
          <a href="{{ item.url | relative_url }}"{% if page.active == item.key %} class="active"{% endif %}>{{ item.label }}</a>
        {% endfor %}
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">◑</button>
      </div>
    </nav>
  </header>

  {{ content }}

  <footer class="sheet footer page-corners">
    <span class="frame-tick bl" aria-hidden="true"></span>
    <span class="frame-tick br" aria-hidden="true"></span>
    <a href="mailto:{{ site.data.site.email }}">{{ site.data.site.email }}</a>
    <div class="links">
      {% for s in site.data.site.socials %}<a href="{{ s.url }}">{{ s.label }}</a>{% endfor %}
    </div>
    <span class="sheet-no">zuriel erikson valencia joven</span>
  </footer>

  <script>
  /* JS-driven animations — reliable on iOS Safari */
  (function () {
    var reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* ── SVG callout draw-on ───────────────────────────────── */
    function initCallouts() {
      document.querySelectorAll('.ld').forEach(function (el) {
        if (reduced) return;
        var delay = (parseFloat(el.style.animationDelay) || 0.4) * 1000;
        el.style.strokeDashoffset = '200';
        setTimeout(function () {
          el.style.transition = 'stroke-dashoffset 1s ease';
          el.style.strokeDashoffset = '0';
        }, delay);
      });
      document.querySelectorAll('.dot').forEach(function (el) {
        if (reduced) return;
        var delay = (parseFloat(el.style.animationDelay) || 0.4) * 1000;
        el.style.opacity = '0';
        setTimeout(function () {
          el.style.transition = 'opacity 0.5s ease';
          el.style.opacity = '1';
        }, delay + 550);
      });
    }

    /* ── Carousel RAF scroll ───────────────────────────────── */
    function initCarousel() {
      var track = document.querySelector('.affil-track');
      if (!track || reduced) return;
      var pos = 0, last = null, speed = 55; /* px / second */
      function step(ts) {
        if (last === null) last = ts;
        pos += speed * (ts - last) / 1000;
        last = ts;
        var half = track.scrollWidth / 2;
        if (half > 0 && pos >= half) pos -= half;
        track.style.webkitTransform = 'translateX(-' + pos + 'px)';
        track.style.transform       = 'translateX(-' + pos + 'px)';
        requestAnimationFrame(step);
      }
      /* wait for images so scrollWidth is correct */
      if (document.readyState === 'complete') {
        requestAnimationFrame(step);
      } else {
        window.addEventListener('load', function () { requestAnimationFrame(step); });
      }
    }

    function init() { initCallouts(); initCarousel(); }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>

  <script>
  (function () {
    var root    = document.documentElement;
    var btn     = document.getElementById('themeToggle');
    var favicon = document.getElementById('favicon-el');
    var lightFav = '{{ "/assets/img/favicon-light.png" | relative_url }}';
    var darkFav  = '{{ "/assets/img/favicon-dark.png"  | relative_url }}';

    function applyTheme(dark) {
      if (dark) {
        root.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
        favicon.href = darkFav;
      } else {
        root.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
        favicon.href = lightFav;
      }
    }

    // sync favicon on initial load
    applyTheme(root.getAttribute('data-theme') === 'dark');

    btn.addEventListener('click', function () {
      applyTheme(root.getAttribute('data-theme') !== 'dark');
    });
  })();
  </script>

</body>
</html>
