      - id: nmr-maldi-cancer
        title: "NMR & MALDI-MS 2D Correlation Spectroscopy"
        description: "Statistical correlation analysis of lipid and metabolite interactions in tumor models using combined NMR and MALDI mass spectrometry. Applied to cancer diagnostics to identify co-varying spectral features linked to metabolic phenotype."
        highlights:
          - "4 posters — 2023–2025"
          - "1 award — pre-clinical poster award"
        tags: [NMR, MALDI-MS, cancer diagnostics, metabolomics]
