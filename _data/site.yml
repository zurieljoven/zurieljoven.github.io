brand: "zurieljoven.com: phd student @ mit"
email: "zuriel@mit.edu"

# top navigation — order matters; `key` is matched against each page's `active:`
nav:
  - { key: home,         label: "home",         url: "/" }
  - { key: research,     label: "research",     url: "/research/" }
  - { key: publications, label: "publications", url: "/publications/" }
  - { key: projects,     label: "projects",     url: "/projects/" }
  - { key: honors,       label: "honors",       url: "/honors/" }
  - { key: cv,           label: "cv",           url: "/cv.pdf" }

# Projects filter logic: "intersection" (must match all active groups) or "union" (match any active filter)
projects_filter_logic: "intersection"

# hero (home page)
hero:
  eyebrow: "§ 01 — zuriel erikson valencia joven"
  title_line_1: "biophotonics"
  title_line_2: "robotics"          # rendered as  × robotics
  lede: "mechanical engineer specializing in biophotonics & medical robotics — building light-based instruments and steerable tools for medicine."
  facts:
    - { k: "current —",  v: "phd student, harvard-mit hst · yun lab, wellman center for photomedicine @ mgh" }
    - { k: "previous —", v: "bs/mse, johns hopkins mechanical engineering · barman lab" }
  # hero figure: set `image` to a path under /img to replace the placeholder
  figure:
    image: ""                       # e.g. "/img/portrait.jpg"
    placeholder: "[ hero portrait · 4:5 ]"
    caption_left: "fig. 1 — z. joven"
    caption_right: "1 photonics · 2 robotics"

